<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>DOCX → PDF</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap');

  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

  :root{
    --bg:#F7F6F3;--card:#fff;--border:#E2DFD8;--border2:#C9C5BC;
    --accent:#2563EB;--accent-h:#1D4ED8;--accent-l:#EFF6FF;
    --text:#111827;--sub:#6B7280;
    --ok:#16A34A;--ok-l:#F0FDF4;--ok-b:#86EFAC;
    --err:#DC2626;--err-l:#FEF2F2;--err-b:#FECACA;
    --drop-bg:#EFF6FF;--drop-b:#93C5FD;
    --pill:#F1F0ED;
  }

  body{
    font-family:'DM Sans',sans-serif;
    background:var(--bg);color:var(--text);
    min-height:100vh;display:flex;
    align-items:center;justify-content:center;
    padding:24px;
  }

  .card{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:16px;
    padding:36px;
    width:100%;max-width:520px;
    box-shadow:0 4px 24px rgba(0,0,0,.06);
  }

  h1{font-size:22px;font-weight:700;letter-spacing:-.4px}
  .sub{font-size:13px;color:var(--sub);margin-top:4px}

  hr{border:none;border-top:1px solid var(--border);margin:24px 0}

  /* Зоны */
  .zones{display:grid;grid-template-columns:1fr auto 1fr;align-items:stretch;gap:0}
  .arrow{display:flex;align-items:center;justify-content:center;
         padding:0 10px;color:var(--border2);font-size:20px;user-select:none}

  .zone{
    border:1.5px dashed var(--border2);
    border-radius:12px;padding:22px 14px;
    text-align:center;cursor:pointer;
    transition:all .18s;background:var(--card);
    position:relative;user-select:none;
  }
  .zone:hover,.zone.over{
    border-color:var(--drop-b);background:var(--drop-bg);
  }
  .zone.loaded{
    border-style:solid;border-color:var(--ok-b);
    background:var(--ok-l);cursor:default;
  }
  .zone-ico{font-size:26px;margin-bottom:8px;display:block}
  .zone-lbl{font-size:11px;font-weight:600;color:var(--sub);
             letter-spacing:.06em;text-transform:uppercase}
  .zone-hint{font-size:11px;color:var(--sub);margin-top:4px}
  .zone.loaded .zone-hint{
    font-size:11px;color:var(--ok);font-weight:600;
    word-break:break-all;line-height:1.3
  }
  .zone-x{
    position:absolute;top:6px;right:8px;
    background:none;border:none;cursor:pointer;
    font-size:14px;color:var(--sub);line-height:1;
    display:none;padding:2px 4px;
  }
  .zone-x:hover{color:var(--err)}
  .zone.loaded .zone-x{display:block}

  input[type=file]{display:none}

  /* Превью */
  .preview{
    background:var(--pill);border:1px solid var(--border);
    border-radius:8px;padding:10px 14px;
    font-size:12px;display:flex;align-items:center;gap:8px;
    margin-top:16px;
  }
  .preview-key{color:var(--sub);white-space:nowrap}
  .preview-val{font-weight:600;color:var(--sub);word-break:break-all}
  .preview-val.ready{color:var(--accent)}

  /* Кнопка */
  .btn{
    display:flex;align-items:center;justify-content:center;gap:8px;
    width:100%;padding:14px;margin-top:14px;
    background:var(--accent);color:#fff;
    border:none;border-radius:10px;
    font-family:inherit;font-size:14px;font-weight:600;
    cursor:pointer;transition:background .15s;
  }
  .btn:hover:not(:disabled){background:var(--accent-h)}
  .btn:disabled{background:#D1D5DB;color:#9CA3AF;cursor:not-allowed}

  /* Прогресс */
  .steps{
    margin-top:18px;background:var(--card);
    border:1px solid var(--border);border-radius:10px;
    padding:14px 16px;display:none;
  }
  .steps.show{display:block}
  .step{
    display:flex;align-items:center;gap:10px;
    font-size:12px;color:var(--sub);padding:3px 0;
  }
  .step-dot{
    width:7px;height:7px;border-radius:50%;
    background:var(--border2);flex-shrink:0;
    transition:background .2s;
  }
  .step.active .step-dot{background:var(--accent);animation:pulse .7s infinite}
  .step.active{color:var(--accent)}
  .step.done .step-dot{background:var(--ok)}
  .step.done{color:var(--ok)}
  .step.err .step-dot{background:var(--err)}
  .step.err{color:var(--err)}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

  .status-msg{font-size:11px;margin-top:8px;color:var(--sub)}

  /* Успех */
  .done-box{
    margin-top:14px;background:var(--ok-l);
    border:1px solid var(--ok-b);border-radius:10px;
    padding:14px 16px;text-align:center;display:none;
  }
  .done-box.show{display:block}
  .done-box p{font-size:13px;color:var(--ok);font-weight:600}
  .done-box small{font-size:11px;color:var(--sub)}
</style>
</head>
<body>
<div class="card">

  <h1>DOCX → PDF</h1>
  <p class="sub">Об'єднує два документи Word в один PDF</p>
  <hr>

  <div class="zones">
    <div class="zone" id="z1" ondragover="dov(event,1)" ondragleave="dlv(1)" ondrop="drp(event,1)" onclick="document.getElementById('f1').click()">
      <button class="zone-x" onclick="clr(1,event)">✕</button>
      <span class="zone-ico" id="ico1">⬆</span>
      <div class="zone-lbl">Документ 1</div>
      <div class="zone-hint" id="h1">перетягни або натисни</div>
    </div>

    <div class="arrow">→</div>

    <div class="zone" id="z2" ondragover="dov(event,2)" ondragleave="dlv(2)" ondrop="drp(event,2)" onclick="document.getElementById('f2').click()">
      <button class="zone-x" onclick="clr(2,event)">✕</button>
      <span class="zone-ico" id="ico2">⬆</span>
      <div class="zone-lbl">Документ 2</div>
      <div class="zone-hint" id="h2">перетягни або натисни</div>
    </div>
  </div>

  <input type="file" id="f1" accept=".docx" onchange="pick(1,this.files[0])">
  <input type="file" id="f2" accept=".docx" onchange="pick(2,this.files[0])">

  <div class="preview">
    <span class="preview-key">Файл результату →</span>
    <span class="preview-val" id="outName">вибери обидва файли</span>
  </div>

  <button class="btn" id="btn" disabled onclick="run()">Створити PDF</button>

  <div class="steps" id="steps">
    <div class="step" id="s1"><div class="step-dot"></div><span>Конвертація документу 1 (LibreOffice)</span></div>
    <div class="step" id="s2"><div class="step-dot"></div><span>Конвертація документу 2 (LibreOffice)</span></div>
    <div class="step" id="s3"><div class="step-dot"></div><span>Об'єднання сторінок</span></div>
    <div class="step" id="s4"><div class="step-dot"></div><span>Збереження PDF</span></div>
    <div class="status-msg" id="smsg"></div>
  </div>

  <div class="done-box" id="doneBox">
    <p>✅ Готово!</p>
    <small id="doneText"></small>
  </div>

</div>

<script>
const files = {1:null, 2:null};

function numFrom(name){
  const m = name.replace(/\.docx$/i,'').match(/\d+/g);
  return m ? m[m.length-1] : null;
}
function outName(){
  const n = (files[1] && numFrom(files[1].name)) ||
            (files[2] && numFrom(files[2].name)) || '1';
  return `documents_${n}.pdf`;
}
function refresh(){
  const ok = files[1] && files[2];
  const btn = document.getElementById('btn');
  btn.disabled = !ok;
  const ov = document.getElementById('outName');
  ov.textContent = ok ? outName() : 'вибери обидва файли';
  ov.className = 'preview-val' + (ok ? ' ready' : '');
}
function setZone(n, file){
  files[n] = file;
  const z = document.getElementById('z'+n);
  z.classList.add('loaded');
  document.getElementById('ico'+n).textContent = '✓';
  document.getElementById('h'+n).textContent = file.name;
  refresh();
}
function pick(n, file){
  if(file && file.name.endsWith('.docx')) setZone(n, file);
}
function clr(n, e){
  e.stopPropagation();
  files[n] = null;
  const z = document.getElementById('z'+n);
  z.classList.remove('loaded');
  document.getElementById('ico'+n).textContent = '⬆';
  document.getElementById('h'+n).textContent = 'перетягни або натисни';
  document.getElementById('f'+n).value = '';
  refresh();
}
function dov(e,n){ e.preventDefault(); document.getElementById('z'+n).classList.add('over'); }
function dlv(n){ document.getElementById('z'+n).classList.remove('over'); }
function drp(e,n){
  e.preventDefault(); dlv(n);
  const f = e.dataTransfer.files[0];
  if(f && f.name.endsWith('.docx')) setZone(n,f);
  else document.getElementById('z'+n).style.borderColor='var(--err)';
  setTimeout(()=>document.getElementById('z'+n).style.borderColor='',700);
}

function step(n,cls){
  ['active','done','err'].forEach(c=>document.getElementById('s'+n).classList.remove(c));
  if(cls) document.getElementById('s'+n).classList.add(cls);
}
function smsg(t,c){ const el=document.getElementById('smsg'); el.textContent=t; el.style.color=c||''; }

async function run(){
  document.getElementById('btn').disabled = true;
  document.getElementById('steps').classList.add('show');
  document.getElementById('doneBox').classList.remove('show');
  [1,2,3,4].forEach(n=>step(n,''));
  smsg('');

  const fd = new FormData();
  fd.append('file1', files[1]);
  fd.append('file2', files[2]);

  step(1,'active'); smsg('Відправляю файли...');

  try {
    const res = await fetch('/merge', {method:'POST', body:fd});

    if(!res.ok){
      const err = await res.json();
      throw new Error(err.error || res.statusText);
    }

    step(1,'done'); step(2,'done'); step(3,'done'); step(4,'active');
    smsg('Зберігаю файл...');

    const blob = await res.blob();
    step(4,'done');

    const name = outName();
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href=url; a.download=name; a.click();
    URL.revokeObjectURL(url);

    smsg('');
    const done = document.getElementById('doneBox');
    done.classList.add('show');
    document.getElementById('doneText').textContent =
      `Файл ${name} завантажено`;

  } catch(e) {
    [1,2,3,4].forEach(n=>{
      if(document.getElementById('s'+n).classList.contains('active')) step(n,'err');
    });
    smsg('Помилка: '+e.message, 'var(--err)');
  }

  document.getElementById('btn').disabled = false;
}
</script>
</body>
</html>
